<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardapio</title>
    <link rel="stylesheet" href="css/style.cardapio.css">
    <link rel="shortcut icon" href="imagens/cafe_icone.png" type="image/x-icon">
</head>

<body>
    <div id="container_header">

        <header>

            <div id="container_header__text">
                <p> <img src="imagens/cafe_icone.png" alt="icone de cafe" width="30px"> Café Online </p>
            </div><!--fim container_header__text-->

            <div id="container_header__links">
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#">Cardápio</a></li>
                        <li><a href="#">Contato</a></li>
                    </ul>
                </nav>

            </div><!--fim container_header__links-->

        </header>


    </div><!--fim container-header-->



    <main>
        <section id="section_cardapio_itens">
            <h5>Nosso Cardápio</h5>

            <button class="btn_categoria_cafe">Cafés</button>
            <button class="btn_categoria_salgados">Salgados</button>
            <button class="btn_categoria_doces">Doces</button>


            <div id="container_cardapio">

                <div id="container_cardapio_itens">

                    <div class="box_cardapio">

                    </div>

                </div><!--fim container_cardapio_itens-->

                <div id="container_cardapio_itens_pedido">
                    <h5>Meu Carrinho</h5>

                    <hr>

                    <h5>Seu Pedido:</h5>

                    <ul class="lista_pedidos">
                    
                    </ul>

                    <hr>

                    <p class="p_total"> Total: R$</p>

                    <button id="btn_enviar_pedido">Enviar Pedido no WhatsApp</button>


                </div><!--fim container_cardapio_itens_pedido-->


            </div><!--fim container-cardapio-itens-->





        </section><!--fim section-cardapio-itens-->


    </main>






    <script src="js/script.js"></script>
</body>

</html>
